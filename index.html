<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calendario Familiar</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #F8F9FB; min-height: 100vh; padding: 20px; }
    button { cursor: pointer; }
    .grid { display: grid; grid-template-columns: 1fr 320px; gap: 16px; }
    .card { background: #fff; border-radius: 16px; padding: 20px; box-shadow: 0 1px 6px rgba(0,0,0,.06); }
    .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
    .cal-day { min-height: 52px; border-radius: 10px; padding: 4px 5px; cursor: pointer; }
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.3); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .modal { background: #fff; border-radius: 16px; padding: 28px; width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,.12); max-height: 90vh; overflow-y: auto; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .finp { width: 100%; padding: 8px 10px; border-radius: 8px; border: 1.5px solid #e5e7eb; font-size: 14px; outline: none; background: #fafafa; box-sizing: border-box; }
    label { display: block; font-size: 12px; font-weight: 600; color: #888; margin-bottom: 5px; }
    @media (max-width: 650px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div id="app"><p style="padding:20px;color:#888">Cargando...</p></div>
<div id="modal-root"></div>

<script type="module">
import { initializeApp, getApps } from "https://cdn.jsdelivr.net/npm/firebase@10.12.0/app/+esm";
import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from "https://cdn.jsdelivr.net/npm/firebase@10.12.0/firestore/+esm";

const firebaseConfig = {
  apiKey: "AIzaSyAF9BnqsRo2SAO1mzXM8VeRBMFgH9bQ8Jc",
  authDomain: "calendario-familiar-a54aa.firebaseapp.com",
  projectId: "calendario-familiar-a54aa",
  storageBucket: "calendario-familiar-a54aa.firebasestorage.app",
  messagingSenderId: "1029082726949",
  appId: "1:1029082726949:web:609952c599563d871075cc"
};

const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
const db = getFirestore(app);

const DEFAULT_MEMBERS = [
  { id: 1, name: "Mamá", color: "#7C6AF7" },
  { id: 2, name: "Papá", color: "#F97316" },
  { id: 3, name: "Hijo/a 1", color: "#10B981" },
  { id: 4, name: "Hijo/a 2", color: "#F43F5E" },
];

const DAYS = ["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"];
const MONTHS = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

// Modal state is kept separately and never triggers full re-render
let modalData = null;

let state = {
  year: new Date().getFullYear(),
  month: new Date().getMonth(),
  selectedDate: todayStr(),
  events: [],
  members: [...DEFAULT_MEMBERS],
  filter: 0,
  editingMemberId: null,
  status: "Conectando…",
  notifGranted: false
};

const notified = new Set();

function todayStr() {
  const t = new Date();
  return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
}
function dateStr(y,m,d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}
function getDaysInMonth(y,m) { return new Date(y,m+1,0).getDate(); }
function getFirstDay(y,m) { const d=new Date(y,m,1).getDay(); return d===0?6:d-1; }
function uid() { return Math.random().toString(36).slice(2,10); }
function memberColor(id) { return state.members.find(m=>m.id===id)?.color||"#999"; }

function setState(patch) { state = {...state, ...patch}; render(); }

function checkNotifications() {
  if (!state.notifGranted) return;
  const now = new Date();
  const todayS = todayStr();
  state.events.forEach(e => {
    if (!e.time || e.date !== todayS) return;
    const [h, m] = e.time.split(":").map(Number);
    const eventTime = new Date();
    eventTime.setHours(h, m, 0, 0);
    const diff = eventTime - now;
    const key = `${e.id}-notif`;
    if (diff > 55*60*1000 && diff < 65*60*1000 && !notified.has(key)) {
      notified.add(key);
      new Notification(`${e.type==="appointment"?"📌 Cita":"📋 Tarea"}: ${e.title}`, {
        body: `En 1 hora · ${e.time}${e.place ? " · "+e.place : ""}`
      });
    }
  });
}
setInterval(checkNotifications, 60000);

onSnapshot(collection(db,"events"), snap => {
  state.events = snap.docs.map(d => ({id:d.id,...d.data()}));
  state.status = "🟢 Sincronizado";
  checkNotifications();
  render();
}, () => { state.status = "🔴 Sin conexión"; render(); });

onSnapshot(collection(db,"members"), snap => {
  if (snap.empty) {
    DEFAULT_MEMBERS.forEach(m => setDoc(doc(db,"members",String(m.id)), m));
  } else {
    const fromDB = snap.docs.map(d => ({...d.data()}));
    state.members = DEFAULT_MEMBERS.map(def => fromDB.find(m => Number(m.id)===def.id)||def);
    render();
  }
});

if ("Notification" in window && Notification.permission==="granted") state.notifGranted = true;

async function requestNotif() {
  if (!("Notification" in window)) { alert("Tu navegador no soporta notificaciones."); return; }
  const p = await Notification.requestPermission();
  if (p==="granted") {
    setState({notifGranted: true});
    new Notification("🏠 Calendario Familiar", { body: "¡Avisos activados! Te avisaremos 1 hora antes de cada evento." });
  } else {
    alert("Permiso denegado. Activa las notificaciones en los ajustes de tu navegador.");
  }
}

async function saveEvent(evt) {
  const id = String(evt.id||uid());
  const toSave = {...evt, id};
  const exists = state.events.find(e=>e.id===id);
  state.events = exists ? state.events.map(e=>e.id===id?toSave:e) : [...state.events, toSave];
  modalData = null;
  renderModal();
  render();
  try { await setDoc(doc(db,"events",id), toSave); } catch(e) { console.error(e); }
}

async function deleteEvent(id) {
  state.events = state.events.filter(e=>e.id!==id);
  render();
  try { await deleteDoc(doc(db,"events",String(id))); } catch(e) { console.error(e); }
}

async function toggleDone(id) {
  state.events = state.events.map(e=>e.id===id?{...e,done:!e.done}:e);
  render();
  const evt = state.events.find(e=>e.id===id);
  if (evt) try { await setDoc(doc(db,"events",String(id)), evt); } catch(e) { console.error(e); }
}

async function saveMember(id, name) {
  if (!name.trim()) return;
  state.members = state.members.map(m=>m.id===id?{...m,name:name.trim()}:m);
  state.editingMemberId = null;
  render();
  const member = state.members.find(m=>m.id===id);
  try { await setDoc(doc(db,"members",String(id)), member); } catch(e) { console.error(e); }
}

// Modal renders into separate div — never touched by main render()
function renderModal() {
  const root = document.getElementById("modal-root");
  if (!modalData) { root.innerHTML = ""; return; }
  const {mode, event: e} = modalData;
  const members = state.members;
  root.innerHTML = `
    <div class="modal-bg" id="modal-bg">
      <div class="modal">
        <h3 style="margin:0 0 18px;font-size:17px;color:#1a1a2e">${mode==='add'?'Nuevo evento':'Editar evento'}</h3>
        <div style="margin-bottom:12px">
          <label>Tipo</label>
          <div style="display:flex;gap:8px">
            <button id="btn-task" style="flex:1;padding:7px;border-radius:8px;border:none;background:${e.type==='task'?'#7C6AF7':'#f0f0f0'};color:${e.type==='task'?'#fff':'#555'};font-weight:600;font-size:13px">✅ Tarea</button>
            <button id="btn-appt" style="flex:1;padding:7px;border-radius:8px;border:none;background:${e.type==='appointment'?'#7C6AF7':'#f0f0f0'};color:${e.type==='appointment'?'#fff':'#555'};font-weight:600;font-size:13px">📌 Cita</button>
          </div>
        </div>
        <div style="margin-bottom:12px">
          <label>Título</label>
          <input id="f-title" class="finp" value="${e.title||''}" placeholder="Ej: Ir al médico"/>
        </div>
        <div class="two-col">
          <div><label>Fecha</label><input id="f-date" type="date" class="finp" value="${e.date||''}"/></div>
          <div><label>Hora</label><input id="f-time" type="time" class="finp" value="${e.time||''}"/></div>
        </div>
        <div id="appt-fields" style="display:${e.type==='appointment'?'block':'none'}">
          <div class="two-col">
            <div><label>Lugar</label><input id="f-place" class="finp" value="${e.place||''}" placeholder="Clínica..."/></div>
            <div><label>Duración</label><input id="f-duration" class="finp" value="${e.duration||''}" placeholder="Ej: 1h"/></div>
          </div>
        </div>
        <div style="margin-bottom:12px">
          <label>Descripción (opcional)</label>
          <input id="f-desc" class="finp" value="${e.desc||''}" placeholder="Notas adicionales"/>
        </div>
        <div style="margin-bottom:18px">
          <label>Miembros</label>
          <div id="member-btns" style="display:flex;gap:8px;flex-wrap:wrap">
            ${members.map(m=>`
              <button data-mid="${m.id}" style="padding:5px 12px;border-radius:20px;border:none;background:${(e.members||[]).includes(m.id)?m.color:'#f0f0f0'};color:${(e.members||[]).includes(m.id)?'#fff':'#555'};font-size:13px;font-weight:600">${m.name}</button>
            `).join("")}
          </div>
        </div>
        <div style="display:flex;gap:10px">
          <button id="btn-cancel" style="flex:1;padding:10px;border-radius:9px;border:none;background:#f0f0f0;color:#555;font-weight:600">Cancelar</button>
          <button id="btn-save" style="flex:1;padding:10px;border-radius:9px;border:none;background:#7C6AF7;color:#fff;font-weight:600">Guardar</button>
        </div>
      </div>
    </div>
  `;

  // Attach events without re-rendering
  document.getElementById("modal-bg").addEventListener("click", e => { if(e.target.id==="modal-bg") closeModal(); });
  document.getElementById("btn-cancel").addEventListener("click", closeModal);
  document.getElementById("btn-task").addEventListener("click", () => {
    modalData.event.type = "task";
    document.getElementById("appt-fields").style.display = "none";
    document.getElementById("btn-task").style.background = "#7C6AF7";
    document.getElementById("btn-task").style.color = "#fff";
    document.getElementById("btn-appt").style.background = "#f0f0f0";
    document.getElementById("btn-appt").style.color = "#555";
  });
  document.getElementById("btn-appt").addEventListener("click", () => {
    modalData.event.type = "appointment";
    document.getElementById("appt-fields").style.display = "block";
    document.getElementById("btn-appt").style.background = "#7C6AF7";
    document.getElementById("btn-appt").style.color = "#fff";
    document.getElementById("btn-task").style.background = "#f0f0f0";
    document.getElementById("btn-task").style.color = "#555";
  });
  document.getElementById("btn-save").addEventListener("click", () => {
    const title = document.getElementById("f-title").value.trim();
    if (!title) return;
    saveEvent({
      ...modalData.event,
      title,
      date: document.getElementById("f-date").value,
      time: document.getElementById("f-time").value,
      place: document.getElementById("f-place")?.value||"",
      duration: document.getElementById("f-duration")?.value||"",
      desc: document.getElementById("f-desc").value,
    });
  });
  document.querySelectorAll("[data-mid]").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = Number(btn.dataset.mid);
      const ms = modalData.event.members||[];
      modalData.event.members = ms.includes(id) ? ms.filter(m=>m!==id) : [...ms, id];
      const mem = state.members.find(m=>m.id===id);
      if (mem) {
        btn.style.background = modalData.event.members.includes(id) ? mem.color : "#f0f0f0";
        btn.style.color = modalData.event.members.includes(id) ? "#fff" : "#555";
      }
    });
  });
}

function closeModal() { modalData = null; renderModal(); }

function render() {
  const {year,month,selectedDate,events,members,filter,editingMemberId,status,notifGranted} = state;
  const daysInMonth = getDaysInMonth(year,month);
  const firstDay = getFirstDay(year,month);
  const selectedEvents = events
    .filter(e=>e.date===selectedDate&&(filter===0||e.members?.includes(filter)))
    .sort((a,b)=>(a.time||"").localeCompare(b.time||""));

  document.getElementById("app").innerHTML = `
    <div style="max-width:900px;margin:0 auto">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div>
          <h1 style="font-size:22px;font-weight:700;color:#1a1a2e">🏠 Calendario Familiar</h1>
          <span style="font-size:12px;color:#888">${status}</span>
        </div>
        ${notifGranted
          ? `<span style="font-size:12px;color:#10B981">🔔 Avisos activos</span>`
          : `<button id="btn-notif" style="background:#7C6AF7;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:13px">🔔 Activar avisos</button>`
        }
      </div>

      <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center">
        <button onclick="setFilter(0)" style="padding:6px 14px;border-radius:20px;border:none;background:${filter===0?'#1a1a2e':'#e5e7eb'};color:${filter===0?'#fff':'#444'};font-size:13px">Todos</button>
        ${members.map(m=>`
          <div style="display:flex;align-items:center;gap:2px">
            ${editingMemberId===m.id ? `
              <input id="edit-${m.id}" type="text" value="${m.name}" style="width:90px;padding:4px 8px;border-radius:8px;border:1.5px solid ${m.color};font-size:13px;outline:none"/>
              <button onclick="confirmMember(${m.id})" style="background:${m.color};border:none;border-radius:8px;color:#fff;padding:4px 8px;font-size:13px">✓</button>
              <button onclick="cancelMember()" style="background:#e5e7eb;border:none;border-radius:8px;color:#555;padding:4px 8px;font-size:13px">✕</button>
            ` : `
              <button onclick="setFilter(${m.id})" style="padding:6px 14px;border-radius:20px;border:none;background:${filter===m.id?m.color:'#e5e7eb'};color:${filter===m.id?'#fff':'#444'};font-size:13px">${m.name}</button>
              <button onclick="editMember(${m.id})" style="background:none;border:none;font-size:12px;color:#bbb;padding:2px 3px">✏️</button>
            `}
          </div>
        `).join("")}
      </div>

      <div class="grid">
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
            <button onclick="prevMonth()" style="background:none;border:none;font-size:18px;color:#555">‹</button>
            <span style="font-weight:700;font-size:16px;color:#1a1a2e">${MONTHS[month]} ${year}</span>
            <button onclick="nextMonth()" style="background:none;border:none;font-size:18px;color:#555">›</button>
          </div>
          <div class="cal-grid" style="margin-bottom:4px">
            ${DAYS.map(d=>`<div style="text-align:center;font-size:12px;font-weight:600;color:#aaa;padding-bottom:4px">${d}</div>`).join("")}
          </div>
          <div class="cal-grid">
            ${Array.from({length:firstDay}).map(()=>`<div></div>`).join("")}
            ${Array.from({length:daysInMonth}).map((_,i)=>{
              const d=i+1, ds=dateStr(year,month,d);
              const evts=events.filter(e=>e.date===ds&&(filter===0||e.members?.includes(filter)));
              const isToday=ds===todayStr(), isSel=ds===selectedDate;
              return `<div class="cal-day" onclick="selectDate('${ds}')"
                style="background:${isSel?'#7C6AF7':isToday?'#F0EEFF':'#fafafa'};border:1.5px solid ${isToday&&!isSel?'#7C6AF7':'transparent'}">
                <div style="font-size:13px;font-weight:600;color:${isSel?'#fff':isToday?'#7C6AF7':'#333'};margin-bottom:2px">${d}</div>
                <div style="display:flex;flex-wrap:wrap;gap:2px">
                  ${evts.slice(0,3).map(e=>`<div style="width:7px;height:7px;border-radius:50%;background:${e.type==='appointment'?'#F43F5E':memberColor(e.members?.[0])}"></div>`).join("")}
                  ${evts.length>3?`<span style="font-size:9px;color:${isSel?'#fff':'#999'}">+${evts.length-3}</span>`:""}
                </div>
              </div>`;
            }).join("")}
          </div>
          <div style="margin-top:14px;display:flex;gap:14px;font-size:12px;color:#888">
            <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#7C6AF7;margin-right:4px"></span>Tarea</span>
            <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#F43F5E;margin-right:4px"></span>Cita</span>
          </div>
        </div>

        <div class="card" style="display:flex;flex-direction:column">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
            <div>
              <div style="font-weight:700;font-size:15px;color:#1a1a2e">${selectedDate===todayStr()?"Hoy":selectedDate}</div>
              <div style="font-size:12px;color:#aaa">${selectedEvents.length} evento(s)</div>
            </div>
            <button id="btn-add" style="background:#7C6AF7;color:#fff;border:none;border-radius:8px;padding:7px 12px;font-size:13px;font-weight:600">+ Añadir</button>
          </div>
          <div style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px">
            ${selectedEvents.length===0
              ? `<div style="color:#bbb;font-size:14px;text-align:center;margin-top:30px">Sin eventos este día</div>`
              : selectedEvents.map(e=>`
                <div style="border-radius:10px;padding:10px 12px;background:${e.type==='appointment'?'#FFF1F4':'#F5F3FF'};border-left:3px solid ${e.type==='appointment'?'#F43F5E':'#7C6AF7'}">
                  <div style="display:flex;justify-content:space-between;align-items:flex-start">
                    <div style="flex:1">
                      <div style="display:flex;align-items:center;gap:6px">
                        ${e.type==='task'?`<input type="checkbox" ${e.done?'checked':''} onchange="toggleDone('${e.id}')" style="cursor:pointer;accent-color:#7C6AF7;width:auto">`:'<span>📌</span>'}
                        <span style="font-weight:600;font-size:14px;color:#1a1a2e;text-decoration:${e.done?'line-through':'none'};opacity:${e.done?.5:1}">${e.title}</span>
                      </div>
                      ${e.time?`<div style="font-size:12px;color:#888;margin-top:2px;margin-left:22px">🕐 ${e.time}${e.duration?' · '+e.duration:''}</div>`:''}
                      ${e.place?`<div style="font-size:12px;color:#888;margin-left:22px">📍 ${e.place}</div>`:''}
                      ${e.desc?`<div style="font-size:12px;color:#999;margin-top:3px;margin-left:22px">${e.desc}</div>`:''}
                      <div style="display:flex;gap:4px;margin-top:5px;margin-left:22px">
                        ${(e.members||[]).map(mid=>{const mem=members.find(m=>m.id===mid);return mem?`<span style="font-size:11px;background:${mem.color}22;color:${mem.color};padding:2px 7px;border-radius:10px;font-weight:600">${mem.name}</span>`:''}).join("")}
                      </div>
                    </div>
                    <div style="display:flex;gap:4px">
                      <button onclick='openEdit(${JSON.stringify(e).replace(/'/g,"&#39;")})' style="background:none;border:none;font-size:14px">✏️</button>
                      <button onclick="deleteEvent('${e.id}')" style="background:none;border:none;font-size:14px">🗑️</button>
                    </div>
                  </div>
                </div>
              `).join("")}
          </div>
        </div>
      </div>
    </div>
  `;

  document.getElementById("btn-notif")?.addEventListener("click", requestNotif);
  document.getElementById("btn-add")?.addEventListener("click", () => {
    modalData = {mode:"add", event:{type:"task",title:"",date:state.selectedDate,time:"",members:[],done:false,desc:"",place:"",duration:""}};
    renderModal();
  });
}

window.setFilter = f => setState({filter:f});
window.selectDate = d => setState({selectedDate:d});
window.prevMonth = () => state.month===0 ? setState({month:11,year:state.year-1}) : setState({month:state.month-1});
window.nextMonth = () => state.month===11 ? setState({month:0,year:state.year+1}) : setState({month:state.month+1});
window.openEdit = evt => { modalData = {mode:"edit", event:{...evt}}; renderModal(); };
window.deleteEvent = id => deleteEvent(id);
window.toggleDone = id => toggleDone(id);
window.editMember = id => setState({editingMemberId:id});
window.cancelMember = () => setState({editingMemberId:null});
window.confirmMember = id => {
  const val = document.getElementById(`edit-${id}`)?.value;
  if(val) saveMember(id, val);
};

render();
</script>
</body>
</html>
