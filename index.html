<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calendario Familiar</title>
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/babel-standalone@7/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>* { box-sizing: border-box; margin: 0; padding: 0; } body { font-family: sans-serif; background: #F8F9FB; min-height: 100vh; }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const firebaseConfig = {
  apiKey: "AIzaSyAF9BnqsRo2SAO1mzXM8VeRBMFgH9bQ8Jc",
  authDomain: "calendario-familiar-a54aa.firebaseapp.com",
  projectId: "calendario-familiar-a54aa",
  storageBucket: "calendario-familiar-a54aa.firebasestorage.app",
  messagingSenderId: "1029082726949",
  appId: "1:1029082726949:web:609952c599563d871075cc"
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const DEFAULT_MEMBERS = [
  { id: 1, name: "Mamá", color: "#7C6AF7" },
  { id: 2, name: "Papá", color: "#F97316" },
  { id: 3, name: "Hijo/a 1", color: "#10B981" },
  { id: 4, name: "Hijo/a 2", color: "#F43F5E" },
];

const DAYS = ["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"];
const MONTHS = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

function getDaysInMonth(y,m){ return new Date(y,m+1,0).getDate(); }
function getFirstDay(y,m){ const d=new Date(y,m,1).getDay(); return d===0?6:d-1; }
function todayStr(){ const t=new Date(); return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`; }
function dateStr(y,m,d){ return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function uid(){ return Math.random().toString(36).slice(2,10); }

const lbl = { display:"block", fontSize:12, fontWeight:600, color:"#888", marginBottom:5 };
const inp = { width:"100%", padding:"8px 10px", borderRadius:8, border:"1.5px solid #e5e7eb", fontSize:14, outline:"none", boxSizing:"border-box", background:"#fafafa" };

function App() {
  const today = new Date();
  const [year, setYear] = useState(today.getFullYear());
  const [month, setMonth] = useState(today.getMonth());
  const [selectedDate, setSelectedDate] = useState(todayStr());
  const [events, setEvents] = useState([]);
  const [members, setMembers] = useState(DEFAULT_MEMBERS);
  const [filter, setFilter] = useState(0);
  const [modal, setModal] = useState(null);
  const [notifGranted, setNotifGranted] = useState(false);
  const [editingMember, setEditingMember] = useState(null);
  const [status, setStatus] = useState("Conectando…");

  useEffect(() => {
    if ("Notification" in window && Notification.permission === "granted") setNotifGranted(true);
    const unsubE = db.collection("events").onSnapshot(snap => {
      setEvents(snap.docs.map(d => ({ id: d.id, ...d.data() })));
      setStatus("🟢 Sincronizado");
    }, () => setStatus("🔴 Sin conexión"));
    const unsubM = db.collection("members").onSnapshot(snap => {
      if (!snap.empty) setMembers(snap.docs.map(d => ({ ...d.data() })));
    });
    return () => { unsubE(); unsubM(); };
  }, []);

  const saveEvent = async (evt) => {
    const id = String(evt.id || uid());
    await db.collection("events").doc(id).set({ ...evt, id });
    setModal(null);
  };
  const deleteEvent = async (id) => db.collection("events").doc(String(id)).delete();
  const toggleDone = async (id) => {
    const evt = events.find(e => e.id === id);
    if (evt) await saveEvent({ ...evt, done: !evt.done });
  };
  const saveMemberName = async () => {
    if (!editingMember?.name.trim()) return;
    const updated = members.map(m => m.id === editingMember.id ? { ...m, name: editingMember.name.trim() } : m);
    for (const m of updated) await db.collection("members").doc(String(m.id)).set(m);
    setEditingMember(null);
  };
  const requestNotif = async () => {
    if ("Notification" in window) {
      const p = await Notification.requestPermission();
      if (p === "granted") setNotifGranted(true);
    }
  };

  const memberColor = (id) => members.find(m => m.id === id)?.color || "#999";
  const eventsOnDay = (d) => {
    const ds = dateStr(year, month, d);
    return events.filter(e => e.date === ds && (filter === 0 || e.members?.includes(filter)));
  };
  const selectedEvents = events
    .filter(e => e.date === selectedDate && (filter === 0 || e.members?.includes(filter)))
    .sort((a,b) => (a.time||"").localeCompare(b.time||""));

  const daysInMonth = getDaysInMonth(year, month);
  const firstDay = getFirstDay(year, month);
  const prevMonth = () => { if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1); };
  const nextMonth = () => { if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1); };
  const openAdd = () => setModal({ mode:"add", event:{ type:"task", title:"", date:selectedDate, time:"", members:[], done:false, desc:"", place:"", duration:"" }});
  const openEdit = (evt) => setModal({ mode:"edit", event:{...evt} });

  return (
    <div style={{ fontFamily:"sans-serif", background:"#F8F9FB", minHeight:"100vh", padding:20 }}>
      <div style={{ maxWidth:900, margin:"0 auto" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
          <div>
            <h1 style={{ margin:0, fontSize:22, fontWeight:700, color:"#1a1a2e" }}>🏠 Calendario Familiar</h1>
            <span style={{ fontSize:12, color:"#888" }}>{status}</span>
          </div>
          {!notifGranted
            ? <button onClick={requestNotif} style={{ background:"#7C6AF7", color:"#fff", border:"none", borderRadius:8, padding:"8px 14px", fontSize:13, cursor:"pointer" }}>🔔 Activar avisos</button>
            : <span style={{ fontSize:12, color:"#10B981" }}>🔔 Avisos activos</span>
          }
        </div>

        <div style={{ display:"flex", gap:8, marginBottom:16, flexWrap:"wrap", alignItems:"center" }}>
          <button onClick={() => setFilter(0)} style={{ padding:"6px 14px", borderRadius:20, border:"none", background:filter===0?"#1a1a2e":"#e5e7eb", color:filter===0?"#fff":"#444", fontSize:13, cursor:"pointer" }}>Todos</button>
          {members.map(m => (
            <div key={m.id} style={{ display:"flex", alignItems:"center", gap:2 }}>
              {editingMember?.id === m.id ? (
                <div style={{ display:"flex", gap:4, alignItems:"center" }}>
                  <input autoFocus value={editingMember.name}
                    onChange={e => setEditingMember(em => ({...em, name:e.target.value}))}
                    onKeyDown={e => { if(e.key==="Enter")saveMemberName(); if(e.key==="Escape")setEditingMember(null); }}
                    style={{ padding:"4px 8px", borderRadius:8, border:`1.5px solid ${m.color}`, fontSize:13, width:90, outline:"none" }}/>
                  <button onClick={saveMemberName} style={{ background:m.color, border:"none", borderRadius:8, color:"#fff", padding:"4px 8px", cursor:"pointer", fontSize:13 }}>✓</button>
                  <button onClick={() => setEditingMember(null)} style={{ background:"#e5e7eb", border:"none", borderRadius:8, color:"#555", padding:"4px 8px", cursor:"pointer", fontSize:13 }}>✕</button>
                </div>
              ) : (
                <>
                  <button onClick={() => setFilter(m.id)} style={{ padding:"6px 14px", borderRadius:20, border:"none", background:filter===m.id?m.color:"#e5e7eb", color:filter===m.id?"#fff":"#444", fontSize:13, cursor:"pointer" }}>{m.name}</button>
                  <button onClick={() => setEditingMember({ id:m.id, name:m.name })} style={{ background:"none", border:"none", cursor:"pointer", fontSize:12, color:"#bbb", padding:"2px 3px" }}>✏️</button>
                </>
              )}
            </div>
          ))}
        </div>

        <div style={{ display:"grid", gridTemplateColumns:"1fr 320px", gap:16 }}>
          <div style={{ background:"#fff", borderRadius:16, padding:20, boxShadow:"0 1px 6px #0001" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
              <button onClick={prevMonth} style={{ background:"none", border:"none", fontSize:18, cursor:"pointer" }}>‹</button>
              <span style={{ fontWeight:700, fontSize:16, color:"#1a1a2e" }}>{MONTHS[month]} {year}</span>
              <button onClick={nextMonth} style={{ background:"none", border:"none", fontSize:18, cursor:"pointer" }}>›</button>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:2, marginBottom:4 }}>
              {DAYS.map(d => <div key={d} style={{ textAlign:"center", fontSize:12, fontWeight:600, color:"#aaa", paddingBottom:4 }}>{d}</div>)}
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:2 }}>
              {Array.from({length:firstDay}).map((_,i) => <div key={`e${i}`}/>)}
              {Array.from({length:daysInMonth}).map((_,i) => {
                const d=i+1, ds=dateStr(year,month,d), evts=eventsOnDay(d);
                const isToday=ds===todayStr(), isSel=ds===selectedDate;
                return (
                  <div key={d} onClick={() => setSelectedDate(ds)} style={{ minHeight:52, borderRadius:10, padding:"4px 5px", cursor:"pointer", background:isSel?"#7C6AF7":isToday?"#F0EEFF":"#fafafa", border:isToday&&!isSel?"1.5px solid #7C6AF7":"1.5px solid transparent" }}>
                    <div style={{ fontSize:13, fontWeight:600, color:isSel?"#fff":isToday?"#7C6AF7":"#333", marginBottom:2 }}>{d}</div>
                    <div style={{ display:"flex", flexWrap:"wrap", gap:2 }}>
                      {evts.slice(0,3).map(e => <div key={e.id} style={{ width:7, height:7, borderRadius:"50%", background:e.type==="appointment"?"#F43F5E":memberColor(e.members?.[0]) }}/>)}
                      {evts.length>3 && <div style={{ fontSize:9, color:isSel?"#fff":"#999" }}>+{evts.length-3}</div>}
                    </div>
                  </div>
                );
              })}
            </div>
            <div style={{ marginTop:14, display:"flex", gap:14, fontSize:12, color:"#888" }}>
              <span><span style={{ display:"inline-block", width:8, height:8, borderRadius:"50%", background:"#7C6AF7", marginRight:4 }}/>Tarea</span>
              <span><span style={{ display:"inline-block", width:8, height:8, borderRadius:"50%", background:"#F43F5E", marginRight:4 }}/>Cita</span>
            </div>
          </div>

          <div style={{ background:"#fff", borderRadius:16, padding:20, boxShadow:"0 1px 6px #0001", display:"flex", flexDirection:"column" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
              <div>
                <div style={{ fontWeight:700, fontSize:15, color:"#1a1a2e" }}>{selectedDate===todayStr()?"Hoy":selectedDate}</div>
                <div style={{ fontSize:12, color:"#aaa" }}>{selectedEvents.length} evento(s)</div>
              </div>
              <button onClick={openAdd} style={{ background:"#7C6AF7", color:"#fff", border:"none", borderRadius:8, padding:"7px 12px", fontSize:13, cursor:"pointer", fontWeight:600 }}>+ Añadir</button>
            </div>
            <div style={{ flex:1, overflowY:"auto", display:"flex", flexDirection:"column", gap:10 }}>
              {selectedEvents.length===0 && <div style={{ color:"#bbb", fontSize:14, textAlign:"center", marginTop:30 }}>Sin eventos este día</div>}
              {selectedEvents.map(e => (
                <div key={e.id} style={{ borderRadius:10, padding:"10px 12px", background:e.type==="appointment"?"#FFF1F4":"#F5F3FF", borderLeft:`3px solid ${e.type==="appointment"?"#F43F5E":"#7C6AF7"}` }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                    <div style={{ flex:1 }}>
                      <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                        {e.type==="task" && <input type="checkbox" checked={!!e.done} onChange={() => toggleDone(e.id)} style={{ cursor:"pointer", accentColor:"#7C6AF7" }}/>}
                        {e.type==="appointment" && <span>📌</span>}
                        <span style={{ fontWeight:600, fontSize:14, color:"#1a1a2e", textDecoration:e.done?"line-through":"none", opacity:e.done?0.5:1 }}>{e.title}</span>
                      </div>
                      {e.time && <div style={{ fontSize:12, color:"#888", marginTop:2, marginLeft:22 }}>🕐 {e.time}{e.duration?` · ${e.duration}`:""}</div>}
                      {e.place && <div style={{ fontSize:12, color:"#888", marginLeft:22 }}>📍 {e.place}</div>}
                      {e.desc && <div style={{ fontSize:12, color:"#999", marginTop:3, marginLeft:22 }}>{e.desc}</div>}
                      <div style={{ display:"flex", gap:4, marginTop:5, marginLeft:22 }}>
                        {(e.members||[]).map(mid => { const mem=members.find(m=>m.id===mid); return mem?<span key={mid} style={{ fontSize:11, background:mem.color+"22", color:mem.color, padding:"2px 7px", borderRadius:10, fontWeight:600 }}>{mem.name}</span>:null; })}
                      </div>
                    </div>
                    <div style={{ display:"flex", gap:4 }}>
                      <button onClick={() => openEdit(e)} style={{ background:"none", border:"none", cursor:"pointer", fontSize:14 }}>✏️</button>
                      <button onClick={() => deleteEvent(e.id)} style={{ background:"none", border:"none", cursor:"pointer", fontSize:14 }}>🗑️</button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
      {modal && <EventModal modal={modal} members={members} onSave={saveEvent} onClose={() => setModal(null)}/>}
    </div>
  );
}

function EventModal({ modal, members, onSave, onClose }) {
  const [evt, setEvt] = useState(modal.event);
  const set = (k,v) => setEvt(e => ({...e,[k]:v}));
  const toggleMember = (id) => setEvt(e => ({ ...e, members:e.members.includes(id)?e.members.filter(m=>m!==id):[...e.members,id] }));
  return (
    <div style={{ position:"fixed", inset:0, background:"#0005", display:"flex", alignItems:"center", justifyContent:"center", zIndex:100 }}>
      <div style={{ background:"#fff", borderRadius:16, padding:28, width:360, boxShadow:"0 8px 32px #0002" }}>
        <h3 style={{ margin:"0 0 18px", fontSize:17, color:"#1a1a2e" }}>{modal.mode==="add"?"Nuevo evento":"Editar evento"}</h3>
        <div style={{ marginBottom:12 }}>
          <label style={lbl}>Tipo</label>
          <div style={{ display:"flex", gap:8 }}>
            {["task","appointment"].map(t => (
              <button key={t} onClick={() => set("type",t)} style={{ flex:1, padding:7, borderRadius:8, border:"none", background:evt.type===t?"#7C6AF7":"#f0f0f0", color:evt.type===t?"#fff":"#555", cursor:"pointer", fontWeight:600, fontSize:13 }}>
                {t==="task"?"✅ Tarea":"📌 Cita"}
              </button>
            ))}
          </div>
        </div>
        <div style={{ marginBottom:12 }}>
          <label style={lbl}>Título</label>
          <input value={evt.title} onChange={e => set("title",e.target.value)} placeholder="Ej: Ir al médico" style={inp}/>
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:12 }}>
          <div><label style={lbl}>Fecha</label><input type="date" value={evt.date} onChange={e => set("date",e.target.value)} style={inp}/></div>
          <div><label style={lbl}>Hora</label><input type="time" value={evt.time} onChange={e => set("time",e.target.value)} style={inp}/></div>
        </div>
        {evt.type==="appointment" && (
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:12 }}>
            <div><label style={lbl}>Lugar</label><input value={evt.place} onChange={e => set("place",e.target.value)} placeholder="Clínica..." style={inp}/></div>
            <div><label style={lbl}>Duración</label><input value={evt.duration} onChange={e => set("duration",e.target.value)} placeholder="Ej: 1h" style={inp}/></div>
          </div>
        )}
        <div style={{ marginBottom:12 }}>
          <label style={lbl}>Descripción (opcional)</label>
          <input value={evt.desc} onChange={e => set("desc",e.target.value)} placeholder="Notas adicionales" style={inp}/>
        </div>
        <div style={{ marginBottom:18 }}>
          <label style={lbl}>Miembros</label>
          <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
            {members.map(m => (
              <button key={m.id} onClick={() => toggleMember(m.id)} style={{ padding:"5px 12px", borderRadius:20, border:"none", background:evt.members.includes(m.id)?m.color:"#f0f0f0", color:evt.members.includes(m.id)?"#fff":"#555", fontSize:13, cursor:"pointer", fontWeight:600 }}>{m.name}</button>
            ))}
          </div>
        </div>
        <div style={{ display:"flex", gap:10 }}>
          <button onClick={onClose} style={{ flex:1, padding:10, borderRadius:9, border:"none", background:"#f0f0f0", color:"#555", cursor:"pointer", fontWeight:600 }}>Cancelar</button>
          <button onClick={() => evt.title && onSave(evt)} style={{ flex:1, padding:10, borderRadius:9, border:"none", background:"#7C6AF7", color:"#fff", cursor:"pointer", fontWeight:600, opacity:evt.title?1:0.5 }}>Guardar</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
